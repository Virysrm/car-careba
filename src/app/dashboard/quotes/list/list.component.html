<h3 style="font-weight: bold;">Lista de Cotizaciones 2026</h3>

<section class="card">
  <table>
    <thead>
      <tr>
        <th class="text-center">#</th>
        <th class="text-center">Status</th>
        <th class="text-center">Cliente</th>
        <th class="text-center">Obra</th>
        <th class="text-center">Dirección</th>
        <th class="text-center">Fecha</th>
        <th></th>
        <th></th>
        <th></th>
      </tr>
    </thead>

    <tbody class="text-center">
      <tr *ngFor="let cot of cotizaciones$ | async; index as i">
        <td class="text-center">{{ i + 1 }}</td>
        <td><span class="badge online">Enviado</span></td>
        <td><strong>{{ cot.cliente }}</strong></td>
        <td>{{ cot.obra }}</td>
        <td>{{ cot.direccion }}</td>
        <td>{{ cot.fecha?.seconds ? (cot.fecha.seconds * 1000 | date:'dd/MM/yyyy') : '—' }}</td>
        <td><button class="btn btn-warning btn-sm"
        (click)="irAEditar(cot)">
  Editar
</button></td>
          <td>
    <button class="btn btn-sm btn-primary"
            (click)="generarPDFDesdeBD(cot)">
      PDF
    </button>
  </td>
      </tr>
